# Upstream Sync Workflow
#
# Syncs files from azure-agentic-infraops (source) to this workshop repo.
# Creates a staging branch and PR with upstream-authoritative updates.
#
# Trigger: manual (workflow_dispatch) + daily schedule
# Auth: requires SYNC_PAT secret (fine-grained PAT with contents:write,
# pull-requests:write, metadata:read)

name: upstream-sync

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref to sync from (tag, branch, or SHA). Defaults to main.
        required: false
        default: main
        type: string
      dry_run:
        description: Preview changes without committing (true/false)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: upstream-sync
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-${{ github.run_id }}

    steps:
      - name: Checkout workshop repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0

      - name: Verify prerequisites
        run: |
          for cmd in git jq rsync gh; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "❌ $cmd not found"; exit 1; }
          done
          echo "✅ All prerequisites available"

      - name: Run sync-upstream.sh
        id: sync
        run: |
          chmod +x scripts/sync-upstream.sh

          SOURCE_REF="${{ inputs.source_ref || 'main' }}"
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}"

          if [[ "$DRY_RUN" == "true" ]]; then
            scripts/sync-upstream.sh --dry-run --ref "$SOURCE_REF" | tee sync-output.txt
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts/sync-upstream.sh --ref "$SOURCE_REF" | tee sync-output.txt

          if [[ ! -f SYNC-MANIFEST.md ]]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(grep -c '^\- `' SYNC-MANIFEST.md || echo "0")
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: |
          echo "## 🔍 Dry Run Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat sync-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No files were modified. Run again with dry_run=false to apply." >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight changed paths summary
        if: hashFiles('SYNC-MANIFEST.md') != ''
        run: |
          echo "## 📂 Changed Paths (Preflight)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL=$(grep -c '^\- `' SYNC-MANIFEST.md || echo "0")
          MAX_SHOW=50

          grep '^\- `' SYNC-MANIFEST.md | \
            sed -E 's/^\- `([^`]+)`.*/\1/' | \
            head -n "$MAX_SHOW" | \
            sed 's/^/- `&`/' >> "$GITHUB_STEP_SUMMARY"

          if [[ "$TOTAL" -gt "$MAX_SHOW" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Showing first $MAX_SHOW of $TOTAL changed paths._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push staging branch
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$SYNC_BRANCH"
          rm -f sync-output.txt

          git add -A
          git commit -m "chore(sync): upstream sync $(date -u +%Y-%m-%d)

          Synced from jonathan-vella/azure-agentic-infraops @ ${{ inputs.source_ref }}
          Files changed: ${{ steps.sync.outputs.change_count }}"

          git push origin "$SYNC_BRANCH"

      - name: Create PR
        id: create_pr
        if: steps.sync.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          MANIFEST=$(cat SYNC-MANIFEST.md)

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$SYNC_BRANCH" \
            --title "chore(sync): upstream sync $DATE" \
            --label upstream-sync \
            --body "## Upstream Sync: $DATE

          Synced from \`jonathan-vella/azure-agentic-infraops\` @ \`${{ inputs.source_ref }}\`.

          - Branch: \`$SYNC_BRANCH\`
          - Files changed: ${{ steps.sync.outputs.change_count }}

          $MANIFEST
          ")

          echo "## ✅ Upstream Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: \`$SYNC_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR**: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Files changed**: ${{ steps.sync.outputs.change_count }}" >> "$GITHUB_STEP_SUMMARY"

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (best effort)
        if: steps.sync.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"

          if gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch; then
            echo "- **Auto-merge**: enabled for PR #$PR_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Could not enable auto-merge for PR #$PR_NUMBER" >&2
            echo "- **Auto-merge**: could not enable (check repository settings/permissions)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: No changes summary
        if: steps.sync.outputs.changes == 'false' && inputs.dry_run == 'false'
        run: |
          echo "## ℹ️ No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All sync-safe files are already up to date with upstream." >> "$GITHUB_STEP_SUMMARY"
