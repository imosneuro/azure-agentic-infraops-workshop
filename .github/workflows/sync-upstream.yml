# Upstream Sync Workflow
#
# Detects changes in the source repo (azure-agentic-infraops), copies
# sync-safe files to a staging branch, creates a GitHub issue with a
# diff manifest, and assigns it to the Copilot coding agent with the
# sync-reviewer custom agent for autonomous validation and PR creation.
#
# Trigger: manual only (workflow_dispatch)
# Auth:    requires SYNC_PAT secret (fine-grained PAT with issues:write,
#          contents:write, pull-requests:write, metadata:read)

name: upstream-sync

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Source ref to sync from (tag, branch, or SHA). Defaults to main.'
        required: false
        default: 'main'
        type: string
      dry_run:
        description: 'Preview changes without committing (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    name: upstream-sync
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-${{ github.run_id }}

    steps:
      # -----------------------------------------------------------------
      # 1. Checkout workshop repo
      # -----------------------------------------------------------------
      - name: Checkout workshop repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0

      # -----------------------------------------------------------------
      # 2. Install dependencies (jq is pre-installed on ubuntu-latest)
      # -----------------------------------------------------------------
      - name: Verify prerequisites
        run: |
          for cmd in git jq rsync; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "❌ $cmd not found"; exit 1; }
          done
          echo "✅ All prerequisites available"

      # -----------------------------------------------------------------
      # 3. Run sync script
      # -----------------------------------------------------------------
      - name: Run sync-upstream.sh
        id: sync
        run: |
          chmod +x scripts/sync-upstream.sh

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            scripts/sync-upstream.sh --dry-run --ref "${{ inputs.source_ref }}" | tee sync-output.txt
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts/sync-upstream.sh --ref "${{ inputs.source_ref }}" | tee sync-output.txt

          # Check if any files actually changed
          if [[ ! -f SYNC-MANIFEST.md ]]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(grep -c '^\- `' SYNC-MANIFEST.md || echo "0")
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------
      # 4. Dry-run summary (exits early)
      # -----------------------------------------------------------------
      - name: Dry-run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "## 🔍 Dry Run Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat sync-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No files were modified. Run again with dry_run=false to apply." >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 5. Commit to staging branch and push
      # -----------------------------------------------------------------
      - name: Commit and push staging branch
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$SYNC_BRANCH"

          # Clean up temp files before staging
          rm -f sync-output.txt

          git add -A
          git commit -m "chore(sync): upstream sync $(date -u +%Y-%m-%d)

          Synced from jonathan-vella/azure-agentic-infraops @ ${{ inputs.source_ref }}
          Files changed: ${{ steps.sync.outputs.change_count }}"

          git push origin "$SYNC_BRANCH"

      # -----------------------------------------------------------------
      # 6. Create issue and assign to Copilot coding agent
      # -----------------------------------------------------------------
      - name: Create issue and assign to Copilot
        if: steps.sync.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          MANIFEST=$(cat SYNC-MANIFEST.md)
          DATE=$(date -u +%Y-%m-%d)

          ISSUE_BODY=$(cat <<'ISSUE_EOF'
          ## 🔄 Upstream Sync: DATE_PLACEHOLDER

          MANIFEST_PLACEHOLDER

          ### Requirements

          1. **Review** all synced files for compatibility with the workshop repo
          2. **Validate** — run these commands and fix any failures:
             - `npm install` (in case dependencies changed)
             - `npm run lint:md`
             - `npm run lint:agent-frontmatter`
             - `npm run lint:skills-format`
          3. **Check for stale references** — `grep -rn "scenarios/" .github/ .devcontainer/` and remove any hits
          4. **reviewSync files** — check `.github/copilot-instructions.md`, `.devcontainer/README.md`, and `pyproject.toml` for source-specific content that needs workshop adaptation
          5. **Preserve** all workshop-specific files (see sync-reviewer agent rules)

          ### Implementation Details

          - Base branch: `BRANCH_PLACEHOLDER` (already contains synced files)
          - Target: `main`
          - Follow conventions in `.github/copilot-instructions.md`
          - Use the `.github/agents/sync-reviewer.agent.md` for detailed rules

          ### Acceptance Criteria

          - [ ] `npm run lint:md` passes
          - [ ] `npm run lint:agent-frontmatter` passes
          - [ ] `npm run lint:skills-format` passes
          - [ ] No `scenarios/` references remain in synced files
          - [ ] reviewSync files adapted for workshop context
          - [ ] PR description lists all changes with rationale
          - [ ] No workshop-specific content is overwritten
          ISSUE_EOF
          )

          # Replace placeholders
          ISSUE_BODY="${ISSUE_BODY//DATE_PLACEHOLDER/$DATE}"
          ISSUE_BODY="${ISSUE_BODY//BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          ISSUE_BODY="${ISSUE_BODY//MANIFEST_PLACEHOLDER/$MANIFEST}"

          # Create issue and assign to Copilot coding agent
          ISSUE_URL=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/issues \
            -f "title=chore(sync): upstream sync $DATE" \
            -f "body=$ISSUE_BODY" \
            -f "labels[]=upstream-sync" \
            --jq '.html_url')

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "📋 Issue created: $ISSUE_URL"

          # Assign to Copilot coding agent with sync-reviewer custom agent
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees \
            -f "assignees[]=copilot-swe-agent[bot]" \
            -f "agent_assignment[target_repo]=${{ github.repository }}" \
            -f "agent_assignment[base_branch]=$SYNC_BRANCH" \
            -f "agent_assignment[custom_instructions]=Read the issue body for full context. Use the sync-reviewer agent rules in .github/agents/sync-reviewer.agent.md. The SYNC-MANIFEST.md on the staging branch lists all changed files." \
            -f "agent_assignment[custom_agent]=sync-reviewer" || {
              echo "⚠️ Could not assign to Copilot coding agent."
              echo "The issue was created at $ISSUE_URL."
              echo "You can manually assign Copilot from the issue page."
            }

          echo "## ✅ Upstream Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Staging branch**: \`$SYNC_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issue**: $ISSUE_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Files changed**: ${{ steps.sync.outputs.change_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Copilot agent**: sync-reviewer assigned" >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 7. No changes summary
      # -----------------------------------------------------------------
      - name: No changes summary
        if: steps.sync.outputs.changes == 'false' && inputs.dry_run == 'false'
        run: |
          echo "## ℹ️ No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All sync-safe files are already up to date with upstream." >> "$GITHUB_STEP_SUMMARY"
