# Upstream Sync Workflow
#
# Detects changes in the source repo (azure-agentic-infraops), copies
# sync-safe files to a staging branch, creates or reuses a draft PR,
# and asks Copilot to iterate on that same PR.
#
# All agent context (never-modify list, validation steps, reviewSync
# rules, PR requirements) is embedded directly in a PR comment.
#
# Trigger: manual only (workflow_dispatch)
# Auth:    requires SYNC_PAT secret (fine-grained PAT with issues:write,
#          contents:write, pull-requests:write, actions:write, metadata:read)

name: upstream-sync

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source ref to sync from (tag, branch, or SHA). Defaults to main."
        required: false
        default: "main"
        type: string
      dry_run:
        description: "Preview changes without committing (true/false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    name: upstream-sync
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-${{ github.run_id }}

    steps:
      # -----------------------------------------------------------------
      # 1. Checkout workshop repo
      # -----------------------------------------------------------------
      - name: Checkout workshop repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0

      # -----------------------------------------------------------------
      # 2. Install dependencies (jq is pre-installed on ubuntu-latest)
      # -----------------------------------------------------------------
      - name: Verify prerequisites
        run: |
          for cmd in git jq rsync; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "❌ $cmd not found"; exit 1; }
          done
          echo "✅ All prerequisites available"

      # -----------------------------------------------------------------
      # 3. Run sync script
      # -----------------------------------------------------------------
      - name: Run sync-upstream.sh
        id: sync
        run: |
          chmod +x scripts/sync-upstream.sh

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            scripts/sync-upstream.sh --dry-run --ref "${{ inputs.source_ref }}" | tee sync-output.txt
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts/sync-upstream.sh --ref "${{ inputs.source_ref }}" | tee sync-output.txt

          # Check if any files actually changed
          if [[ ! -f SYNC-MANIFEST.md ]]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(grep -c '^\- `' SYNC-MANIFEST.md || echo "0")
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"
          fi

      # -----------------------------------------------------------------
      # 4. Dry-run summary (exits early)
      # -----------------------------------------------------------------
      - name: Dry-run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "## 🔍 Dry Run Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat sync-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No files were modified. Run again with dry_run=false to apply." >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 5. Commit to staging branch and push
      # -----------------------------------------------------------------
      - name: Commit and push staging branch
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$SYNC_BRANCH"

          # Clean up temp files before staging
          rm -f sync-output.txt

          git add -A
          git commit -m "chore(sync): upstream sync $(date -u +%Y-%m-%d)

          Synced from jonathan-vella/azure-agentic-infraops @ ${{ inputs.source_ref }}
          Files changed: ${{ steps.sync.outputs.change_count }}"

          git push origin "$SYNC_BRANCH"

      # -----------------------------------------------------------------
      # 6. Create/reuse issue, assign Copilot, and reinforce PR constraints
      # -----------------------------------------------------------------
      - name: Create/reuse issue and request Copilot coding agent
        if: steps.sync.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ISSUE_TITLE="chore(sync): upstream sync $DATE"

          EXISTING_ISSUE_NUMBER=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label upstream-sync \
            --search "\"$ISSUE_TITLE\" in:title" \
            --json number,title \
            --jq 'map(select(.title == "'"$ISSUE_TITLE"'"))[0].number // empty')

          EXISTING_PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --base main \
            --head "$SYNC_BRANCH" \
            --json number \
            --jq '.[0].number // empty')

          EXISTING_PR_URL=""
          if [[ -n "$EXISTING_PR_NUMBER" ]]; then
            EXISTING_PR_URL=$(gh pr view "$EXISTING_PR_NUMBER" --repo "${{ github.repository }}" --json url --jq '.url')
          fi

          MANIFEST=$(cat SYNC-MANIFEST.md)

          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
          ## Upstream Sync: DATE_PLACEHOLDER

          Synced from `jonathan-vella/azure-agentic-infraops` @ `${{ inputs.source_ref }}`.

          - Branch: `SYNC_BRANCH_PLACEHOLDER`
          - Files changed: ${{ steps.sync.outputs.change_count }}
          - Manifest: `SYNC-MANIFEST.md`

          MANIFEST_PLACEHOLDER

          ## Critical Agent Rule (MCP-Only for Issue/PR Ops)

          - Use GitHub MCP tools for issue/PR create-update-comment-review actions.
          - Do **NOT** use shell `gh` CLI commands that require `GH_TOKEN` within the coding agent session.

          ## Task

          1. Start from this issue and keep all work linked to this issue.
          2. If a PR already exists for `SYNC_BRANCH_PLACEHOLDER`, update that PR only.
          3. If no PR exists, create a **Draft** PR from `SYNC_BRANCH_PLACEHOLDER` to `main`, then keep updating the same PR.
          4. Run validation and fix failures in synced files only:
             - `npm install`
             - `npm run lint:md`
             - `npm run lint:agent-frontmatter`
             - `npm run lint:skills-format`
          5. Validate reviewSync files and preserve workshop-specific content.

          ## Never Modify These Files

          - `microhack/**` — all microhack materials
          - `.github/skills/docs-writer/**` — workshop-customized skill
          - `docs/**` — all workshop documentation
          - `README.md`, `VERSION.md`, `CHANGELOG.md`, `CONTRIBUTORS.md` — workshop identity
          - `package.json` — workshop version differs from source

          ## Acceptance Criteria

          - [ ] `npm run lint:md` passes
          - [ ] `npm run lint:agent-frontmatter` passes
          - [ ] `npm run lint:skills-format` passes
          - [ ] reviewSync files adapted for workshop context
          - [ ] No workshop-specific content is overwritten
          ISSUE_BODY_EOF
          )

          ISSUE_BODY="${ISSUE_BODY//DATE_PLACEHOLDER/$DATE}"
          ISSUE_BODY="${ISSUE_BODY//SYNC_BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          ISSUE_BODY="${ISSUE_BODY//MANIFEST_PLACEHOLDER/$MANIFEST}"

          if [[ -n "$EXISTING_ISSUE_NUMBER" ]]; then
            ISSUE_NUMBER="$EXISTING_ISSUE_NUMBER"
            gh issue edit "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --title "$ISSUE_TITLE" \
              --body "$ISSUE_BODY" \
              --add-label upstream-sync
            ISSUE_URL=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json url --jq '.url')
            ISSUE_ACTION="reused"
          else
            ISSUE_URL=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "$ISSUE_TITLE" \
              --label upstream-sync \
              --body "$ISSUE_BODY")
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
            ISSUE_ACTION="created"
          fi

          # Attempt to assign Copilot coding agent; do not fail run if assignment isn't available.
          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --add-assignee "copilot-swe-agent" || true

          ISSUE_TRIGGER_COMMENT=$(cat <<'ISSUE_COMMENT_EOF'
          @copilot Please take this issue.

          IMPORTANT: Use GitHub MCP tools for issue/PR operations.
          Do not use shell `gh` commands requiring `GH_TOKEN` inside coding agent sessions.

          If a PR already exists for this sync branch, update that PR only.
          If not, create one draft PR and keep all updates in that same PR.
          ISSUE_COMMENT_EOF
          )

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$ISSUE_TRIGGER_COMMENT"

          if [[ -n "$EXISTING_PR_NUMBER" ]]; then
            COPILOT_COMMENT=$(cat <<'COMMENT_EOF'
          @copilot Continue updates on this existing PR only. Do not create a new PR.

          IMPORTANT: Use GitHub MCP tools for issue/PR operations.
          Do not use shell `gh` commands requiring `GH_TOKEN` inside coding agent sessions.

          MANIFEST_PLACEHOLDER

          ## Context

          This workshop repo (`jonathan-vella/azure-agentic-infraops-workshop`) is
          a challenge-based fork of the source repo (`jonathan-vella/azure-agentic-infraops`).
          It shares agents, instructions, skills, devcontainer config, and scripts
          with the source, but has its own `microhack/`, `docs/`, and `docs-writer` skill.

          The sync brought in updates to shared files. Your job is to validate these
          updates don't break workshop-specific content.

          ## Task

          1. **Use this PR** for all updates. Do not open another PR.
          2. **Run validation** — fix any failures in synced files only:
             - `npm install`
             - `npm run lint:md`
             - `npm run lint:agent-frontmatter`
             - `npm run lint:skills-format`
          3. **reviewSync files** — these were copied but need workshop adaptation:
             | File | What to Check |
             | --- | --- |
             | `.github/copilot-instructions.md` | Keep workshop-specific entries |
             | `.devcontainer/README.md` | Keep workshop-specific notes |
             | `pyproject.toml` | Keep workshop `version` and `name`; accept dependency updates |

          ## Never Modify These Files

          These are workshop-customized and must not be changed:

          - `microhack/**` — all microhack materials
          - `.github/skills/docs-writer/**` — workshop-customized skill
          - `docs/**` — all workshop documentation
          - `README.md`, `VERSION.md`, `CHANGELOG.md`, `CONTRIBUTORS.md` — workshop identity
          - `package.json` — workshop version differs from source

          ## PR Requirements

          - Keep this PR as **Draft**
          - Ensure label `upstream-sync` is present
          - Update PR body with a table listing every changed file and one-line rationale

          ## Acceptance Criteria

          - [ ] `npm run lint:md` passes
          - [ ] `npm run lint:agent-frontmatter` passes
          - [ ] `npm run lint:skills-format` passes
          - [ ] reviewSync files adapted for workshop context
          - [ ] PR description lists all changes with rationale
          - [ ] No workshop-specific content is overwritten

          ## Standards

          Follow `.github/copilot-instructions.md`:
          - Default region: `swedencentral` (except Static Web Apps → `westeurope`)
          - Required tags: `Environment`, `ManagedBy`, `Project`, `Owner`
          - AVM-first for Bicep; TLS 1.2, HTTPS-only, managed identity

          ## Important Constraints

          - **Do NOT create helper files** like `PR-READY.md`, `create-pr.sh`,
            planning docs, or any temporary scripts. Commit only the actual fixes.
          - **Do NOT modify `.gitignore`** — workshop-specific entries must be preserved.
          - **Do NOT remove `SYNC-MANIFEST.md` from `.gitignore`** — it is excluded intentionally.
          COMMENT_EOF
          )

            COPILOT_COMMENT="${COPILOT_COMMENT//MANIFEST_PLACEHOLDER/$MANIFEST}"

            gh pr comment "$EXISTING_PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body "$COPILOT_COMMENT"
          fi

          echo "✅ Issue $ISSUE_ACTION: $ISSUE_URL"
          if [[ -n "$EXISTING_PR_URL" ]]; then
            echo "✅ Existing PR found: $EXISTING_PR_URL"
          fi

          echo "## ✅ Upstream Sync Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Staging branch**: \`$SYNC_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issue**: $ISSUE_URL" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$EXISTING_PR_URL" ]]; then
            echo "- **PR (existing)**: $EXISTING_PR_URL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **PR**: _to be created by Copilot coding agent from issue_" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Files changed**: ${{ steps.sync.outputs.change_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Copilot**: requested via issue assignment/comment" >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # 7. No changes summary
      # -----------------------------------------------------------------
      - name: No changes summary
        if: steps.sync.outputs.changes == 'false' && inputs.dry_run == 'false'
        run: |
          echo "## ℹ️ No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All sync-safe files are already up to date with upstream." >> "$GITHUB_STEP_SUMMARY"
