# Upstream Sync Workflow
#
# Syncs files from azure-agentic-infraops (source) to this workshop repo.
# - Creates or reuses a canonical PR from sync/upstream-{run_id}
# - Prevents Copilot from creating extra PRs by always pointing to canonical PR
# - Detects and auto-closes superseded PRs (by title, label, or Copilot author)
#
# Trigger: manual only (workflow_dispatch)
# Auth:    requires SYNC_PAT secret (fine-grained PAT with issues:write,
#          contents:write, pull-requests:write, actions:write, metadata:read)

name: upstream-sync

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source ref to sync from (tag, branch, or SHA). Defaults to main.
        required: false
        default: main
        type: string
      dry_run:
        description: Preview changes without committing (true/false)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      auto_close_superseded_prs:
        description: Auto-close non-canonical open PRs with matching sync title
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    name: upstream-sync
    runs-on: ubuntu-latest
    env:
      SYNC_BRANCH: sync/upstream-${{ github.run_id }}

    steps:
      - name: Checkout workshop repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0

      - name: Verify prerequisites
        run: |
          for cmd in git jq rsync gh; do
            command -v "$cmd" >/dev/null 2>&1 || { echo "❌ $cmd not found"; exit 1; }
          done
          echo "✅ All prerequisites available"

      - name: Run sync-upstream.sh
        id: sync
        run: |
          chmod +x scripts/sync-upstream.sh

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            scripts/sync-upstream.sh --dry-run --ref "${{ inputs.source_ref }}" | tee sync-output.txt
            echo "changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts/sync-upstream.sh --ref "${{ inputs.source_ref }}" | tee sync-output.txt

          if [[ ! -f SYNC-MANIFEST.md ]]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No changes detected."
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
            CHANGE_COUNT=$(grep -c '^\- `' SYNC-MANIFEST.md || echo "0")
            echo "change_count=$CHANGE_COUNT" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run summary
        if: inputs.dry_run == 'true'
        run: |
          echo "## 🔍 Dry Run Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat sync-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No files were modified. Run again with dry_run=false to apply." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push staging branch
        if: steps.sync.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$SYNC_BRANCH"
          rm -f sync-output.txt

          git add -A
          git commit -m "chore(sync): upstream sync $(date -u +%Y-%m-%d)

          Synced from jonathan-vella/azure-agentic-infraops @ ${{ inputs.source_ref }}
          Files changed: ${{ steps.sync.outputs.change_count }}"

          git push origin "$SYNC_BRANCH"

      - name: Create/reuse canonical PR and issue with guardrails
        if: steps.sync.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ISSUE_TITLE="chore(sync): upstream sync $DATE"
          PR_TITLE="chore(sync): upstream sync $DATE"

          MANIFEST=$(cat SYNC-MANIFEST.md)

          PR_BODY=$(cat <<'PR_BODY_EOF'
          ## Upstream Sync: DATE_PLACEHOLDER ✅

          Synced from `jonathan-vella/azure-agentic-infraops` @ `${{ inputs.source_ref }}`.

          - Canonical branch: `SYNC_BRANCH_PLACEHOLDER`
          - Files changed: ${{ steps.sync.outputs.change_count }}
          - Manifest: `SYNC-MANIFEST.md`

          MANIFEST_PLACEHOLDER

          ## Guardrails

          - This is the **canonical sync PR** for this run.
          - Any other open PR with same sync title but different head branch is superseded.
          - Copilot must update this PR only and must not create additional PRs.

          Fixes #ISSUE_NUMBER_PLACEHOLDER
          PR_BODY_EOF
          )

          ISSUE_BODY=$(cat <<'ISSUE_BODY_EOF'
          ## Upstream Sync: DATE_PLACEHOLDER

          Synced from `jonathan-vella/azure-agentic-infraops` @ `${{ inputs.source_ref }}`.

          - Branch: `SYNC_BRANCH_PLACEHOLDER`
          - Files changed: ${{ steps.sync.outputs.change_count }}
          - Manifest: `SYNC-MANIFEST.md`

          MANIFEST_PLACEHOLDER

          ## Canonical PR

          **Use only this PR for all updates:** PR_URL_PLACEHOLDER

          ## Critical Agent Rule (MCP-Only for Issue/PR Ops)

          - Use GitHub MCP tools for issue/PR create-update-comment-review actions.
          - Do **NOT** use shell `gh` CLI commands that require `GH_TOKEN` within the coding agent session.

          ## Task

          1. Work only on branch `SYNC_BRANCH_PLACEHOLDER`.
          2. Update only canonical PR PR_NUMBER_PLACEHOLDER.
          3. Do not create any additional PR.
          4. Run validation and fix failures in synced files only:
             - `npm install`
             - `npm run lint:md`
             - `npm run lint:agent-frontmatter`
             - `npm run lint:skills-format`
          5. Validate reviewSync files and preserve workshop-specific content.

          ## Never Modify These Files

          - `microhack/**` — all microhack materials
          - `.github/skills/docs-writer/**` — workshop-customized skill
          - `docs/**` — all workshop documentation
          - `README.md`, `VERSION.md`, `CHANGELOG.md`, `CONTRIBUTORS.md` — workshop identity
          - `package.json` — workshop version differs from source

          ## Acceptance Criteria

          - [ ] `npm run lint:md` passes
          - [ ] `npm run lint:agent-frontmatter` passes
          - [ ] `npm run lint:skills-format` passes
          - [ ] reviewSync files adapted for workshop context
          - [ ] No workshop-specific content is overwritten
          ISSUE_BODY_EOF
          )

          CANONICAL_PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --base main \
            --head "$SYNC_BRANCH" \
            --json number \
            --jq '.[0].number // empty')

          EXISTING_ISSUE_NUMBER=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label upstream-sync \
            --search "\"$ISSUE_TITLE\" in:title" \
            --json number,title \
            --jq 'map(select(.title == "'"$ISSUE_TITLE"'"))[0].number // empty')

          if [[ -n "$EXISTING_ISSUE_NUMBER" ]]; then
            ISSUE_NUMBER="$EXISTING_ISSUE_NUMBER"
          else
            ISSUE_URL=$(gh issue create \
              --repo "${{ github.repository }}" \
              --title "$ISSUE_TITLE" \
              --label upstream-sync \
              --body "Temporary body; will update after PR creation")
            ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          fi

          if [[ -z "$CANONICAL_PR_NUMBER" ]]; then
            DRAFT_PR_URL=$(gh pr create \
              --repo "${{ github.repository }}" \
              --draft \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "$PR_TITLE" \
              --body "Creating canonical sync PR...")
            CANONICAL_PR_NUMBER=$(echo "$DRAFT_PR_URL" | grep -oE '[0-9]+$')
          fi

          CANONICAL_PR_URL=$(gh pr view "$CANONICAL_PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json url \
            --jq '.url')

          PR_BODY="${PR_BODY//DATE_PLACEHOLDER/$DATE}"
          PR_BODY="${PR_BODY//SYNC_BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          PR_BODY="${PR_BODY//MANIFEST_PLACEHOLDER/$MANIFEST}"
          PR_BODY="${PR_BODY//ISSUE_NUMBER_PLACEHOLDER/$ISSUE_NUMBER}"

          gh pr edit "$CANONICAL_PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --add-label upstream-sync

          ISSUE_BODY="${ISSUE_BODY//DATE_PLACEHOLDER/$DATE}"
          ISSUE_BODY="${ISSUE_BODY//SYNC_BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          ISSUE_BODY="${ISSUE_BODY//MANIFEST_PLACEHOLDER/$MANIFEST}"
          ISSUE_BODY="${ISSUE_BODY//PR_NUMBER_PLACEHOLDER/$CANONICAL_PR_NUMBER}"
          ISSUE_BODY="${ISSUE_BODY//PR_URL_PLACEHOLDER/$CANONICAL_PR_URL}"

          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --add-label upstream-sync

          gh issue edit "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --add-assignee "copilot-swe-agent" || true

          ISSUE_TRIGGER_COMMENT=$(cat <<'ISSUE_COMMENT_EOF'
          @copilot Please take this issue.

          IMPORTANT:
          - Work only on `SYNC_BRANCH_PLACEHOLDER`.
          - Update only PR PR_NUMBER_PLACEHOLDER.
          - Do not create any additional PR.
          - Use GitHub MCP tools for issue/PR operations.
          ISSUE_COMMENT_EOF
          )
          ISSUE_TRIGGER_COMMENT="${ISSUE_TRIGGER_COMMENT//SYNC_BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          ISSUE_TRIGGER_COMMENT="${ISSUE_TRIGGER_COMMENT//PR_NUMBER_PLACEHOLDER/$CANONICAL_PR_NUMBER}"

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$ISSUE_TRIGGER_COMMENT"

          PR_GUARDRAIL_COMMENT=$(cat <<'PR_COMMENT_EOF'
          @copilot Continue updates on this canonical sync PR only.

          Hard guardrails:
          - Required head branch: `SYNC_BRANCH_PLACEHOLDER`
          - Required PR: PR_NUMBER_PLACEHOLDER
          - If you detect another PR for this sync date/title, treat it as superseded and continue here only.
          PR_COMMENT_EOF
          )
          PR_GUARDRAIL_COMMENT="${PR_GUARDRAIL_COMMENT//SYNC_BRANCH_PLACEHOLDER/$SYNC_BRANCH}"
          PR_GUARDRAIL_COMMENT="${PR_GUARDRAIL_COMMENT//PR_NUMBER_PLACEHOLDER/$CANONICAL_PR_NUMBER}"

          gh pr comment "$CANONICAL_PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "$PR_GUARDRAIL_COMMENT"

          # Detect superseded PRs using multiple strategies:
          # 1. Title match (original) — catches duplicate runs with same title
          # 2. Label match — catches any open PR labeled upstream-sync on a different branch
          # 3. Copilot branch pattern — catches Copilot-created PRs with copilot/sync or copilot/sub-pr branches
          SUPERSEDED_PRS=""

          # Strategy 1: PRs with matching sync title on different branches
          TITLE_MATCH=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "\"$PR_TITLE\" in:title" \
            --json number,headRefName \
            --jq '.[] | select(.headRefName != "'"$SYNC_BRANCH"'") | .number')

          # Strategy 2: PRs labeled upstream-sync on different branches (catches renamed PRs)
          LABEL_MATCH=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --label upstream-sync \
            --json number,headRefName \
            --jq '.[] | select(.headRefName != "'"$SYNC_BRANCH"'") | .number')

          # Strategy 3: Copilot-created PRs referencing this sync (copilot/sync-*, copilot/sub-pr-*)
          COPILOT_MATCH=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --author "app/copilot-swe-agent" \
            --search "sync in:title" \
            --json number,headRefName \
            --jq '.[] | select(.headRefName != "'"$SYNC_BRANCH"'") | .number')

          # Merge and deduplicate all detected PR numbers
          SUPERSEDED_PRS=$(echo -e "${TITLE_MATCH}\n${LABEL_MATCH}\n${COPILOT_MATCH}" \
            | grep -v '^$' | sort -un)

          CLOSED_COUNT=0
          if [[ -n "$SUPERSEDED_PRS" ]]; then
            while IFS= read -r pr; do
              [[ -z "$pr" ]] && continue
              # Never close the canonical PR
              [[ "$pr" == "$CANONICAL_PR_NUMBER" ]] && continue

              gh pr comment "$pr" \
                --repo "${{ github.repository }}" \
                --body "Superseded by canonical sync PR #$CANONICAL_PR_NUMBER (\`$SYNC_BRANCH\`)."

              if [[ "${{ inputs.auto_close_superseded_prs }}" == "true" ]]; then
                gh pr close "$pr" \
                  --repo "${{ github.repository }}" \
                  --comment "Closing as superseded by canonical sync PR #$CANONICAL_PR_NUMBER."
                CLOSED_COUNT=$((CLOSED_COUNT + 1))
              fi
            done <<< "$SUPERSEDED_PRS"
          fi

          echo "## ✅ Upstream Sync Test Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Canonical branch**: \`$SYNC_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Canonical PR**: $CANONICAL_PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Issue**: https://github.com/${{ github.repository }}/issues/$ISSUE_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Files changed**: ${{ steps.sync.outputs.change_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Superseded PRs auto-closed**: $CLOSED_COUNT" >> "$GITHUB_STEP_SUMMARY"

      - name: No changes summary
        if: steps.sync.outputs.changes == 'false' && inputs.dry_run == 'false'
        run: |
          echo "## ℹ️ No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All sync-safe files are already up to date with upstream." >> "$GITHUB_STEP_SUMMARY"
